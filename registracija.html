<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prisijungti – Žaidimų Alėja</title>

  <link rel="icon" type="image/png" href="nuotraukos/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="header">
  <div class="container">
    <div class="col-12 d-flex justify-content-between align-items-center">

      <div class="flex-grow-1 text-center">
        <div class="logo-wrapper">
          <svg viewBox="0 0 500 180" class="curved-title">
            <defs>
              <path id="curve" d="M 100,160 A 150,150 0 0 1 400,160" />
            </defs>
            <text fill="#F4F4FE" font-size="30" font-weight="bold">
              <textPath href="#curve" startOffset="50%" text-anchor="middle" letter-spacing="5">
                ŽAIDIMŲ ALĖJA
              </textPath>
            </text>
          </svg>
        </div>
      </div>

      <div class="text-end d-flex align-items-center gap-2">
        <button id="nightModeBtn" class="night-btn" type="button">🌙</button>

      </div>

    </div>

    <div class="row">
      <div class="col text-center">
        <nav class="nav justify-content-center mt-2">
          <a href="index.html">Pagrindinis</a>
          <a href="renginiai.html">Renginiai</a>
          <a href="apie.html">Apie</a>
          <a href="įspūdžiai.html">Įspūdžiai</a>
          <a href="kontaktai.html">Kontaktai</a>
          <a href="zaidimas.html">Žaidimas</a>
        </nav>
      </div>
    </div>

  </div>
</header>

    <main class="prisijungti-container">
      <section class="login-section">
        <h2>Registracija</h2>
<form id="registerForm" class="contact-form">

  <label>Vardas:</label>
  <input type="text" id="regName" placeholder="Įveskite vardą">
  <div class="error" id="errorName"></div>

  <label>El. paštas:</label>
  <input type="email" id="regEmail" placeholder="Įveskite el. paštą">
  <div class="error" id="errorEmail"></div>

  <label>Slaptažodis:</label>
  <input type="password" id="regPassword" placeholder="Įveskite slaptažodį">
  <div class="error" id="errorPassword"></div>

  <label>Pakartokite slaptažodį:</label>
  <input type="password" id="regPassword2" placeholder="Pakartokite slaptažodį">
  <div class="error" id="errorPassword2"></div>

  <button type="submit" class="filter-btn">Registruotis</button>
</form>


        <p class="form-bottom-text">
          Jau turite paskyrą? <a href="prisijungti.html">Prisijunkite čia</a>
        </p>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>&copy; 2025 Žaidimų Alėja. Visos teisės saugomos.</p>
    </footer>

  </div>
  <script src="js/register.js" defer></script>
<script src="js/night.js" defer></script>
</body>
</html>
