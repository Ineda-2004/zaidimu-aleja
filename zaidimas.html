<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atspėk miestą – Žaidimų Alėja</title>
  <link rel="icon" type="image/png" href="nuotraukos/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
<header class="header">
  <div class="container">
    <div class="col-12 d-flex justify-content-between align-items-center">
      <div class="flex-grow-1 text-center">
        <div class="logo-wrapper">
          <svg viewBox="0 0 500 180" class="curved-title">
            <defs>
              <path id="curve" d="M 100,160 A 150,150 0 0 1 400,160" />
            </defs>
            <text fill="#F4F4FE" font-size="30" font-weight="bold">
              <textPath href="#curve" startOffset="50%" text-anchor="middle" letter-spacing="5">
                ŽAIDIMŲ ALĖJA
              </textPath>
            </text>
          </svg>
        </div>
      </div>
      <div class="text-end d-flex align-items-center gap-2">
        <button id="nightModeBtn" class="night-btn">🌙</button>
        <a href="prisijungti.html" class="login-btn">Prisijungti</a>
      </div>
    </div>
    <div class="row">
      <div class="col text-center">
        <nav class="nav justify-content-center mt-2">
          <a href="index.html">Pagrindinis</a>
          <a href="renginiai.html">Renginiai</a>
          <a href="apie.html">Apie</a>
          <a href="įspūdžiai.html">Įspūdžiai</a>
          <a href="kontaktai.html">Kontaktai</a>
          <a href="zaidimas.html" class="active">Žaidimas</a>
        </nav>
      </div>
    </div>
  </div>
</header>

<main class="content container my-5">
  <div class="row justify-content-center align-items-center g-4 flex-lg-row-reverse">
    <div class="col-lg-5 text-center">
      <img id="karstykleImage" src="nuotraukos/karstykle0.png" alt="Karstyklė" class="img-fluid karstykle-img" />
    </div>

    <div class="col-lg-7 text-center">
      <h2 class="mb-3">🎯 Atspėk miestą</h2>
      <div id="wordDisplay" class="fs-2 mb-3">_ _ _ _ _</div>
      <div id="letterButtons" class="letter-grid mb-3"></div>

      <div id="status" class="mt-3">
        <p>Likę bandymai: <span id="attemptsLeft">6</span></p>
        <p>Spėtos raidės: <span id="guessedLetters">-</span></p>
        <p id="resultMessage" class="fw-bold mt-2"></p>
      </div>

      <button id="restartBtn" class="filter-btn mt-3">Naujas žaidimas</button>
    </div>
  </div>
</main>


<footer class="footer">
  <p>&copy; 2025 Žaidimų Alėja. Visos teisės saugomos.</p>
</footer>
<div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">
      <div class="modal-header">
        <h5 class="modal-title w-100" id="resultModalLabel">Žaidimo rezultatas</h5>
      </div>
      <div class="modal-body">
        <p id="modalMessage" class="fs-5"></p>
      </div>
      <div class="modal-footer justify-content-center">
        <button type="button" class="btn btn-success" id="modalRestartBtn">🔁 Bandyti dar kartą</button>
      </div>
    </div>
  </div>
</div>
<script src="js/night.js" defer></script>
<script src="js/zaidimas.js" defer></script>
</body>
</html>
